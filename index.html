
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('smartcria-theme') || localStorage.getItem('smart-cria-theme');
          var isDark = t === 'dark';
          if (isDark) document.documentElement.classList.add('dark');
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.setAttribute('content', isDark ? '#000000' : '#ffffff');
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Smart Cria</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
      body { font-family: 'Inter', sans-serif; }
      .font-display { font-family: 'Playfair+Display', serif; }

      @keyframes slideLeft {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      .animate-slide-left { animation: slideLeft 0.3s ease-out forwards; }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

      @keyframes bounceIn {
        0% { transform: translate(-50%, 20px) scale(0.9); opacity: 0; }
        50% { transform: translate(-50%, -5px) scale(1.02); opacity: 1; }
        100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
      }
      .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }

      /* Modal / overlay: só translateY + scale (evita -50% no eixo X que quebra centralização no flex) */
      @keyframes modalBounceIn {
        0% { transform: translateY(16px) scale(0.96); opacity: 0; }
        55% { transform: translateY(-4px) scale(1.02); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .animate-modal-bounce-in { animation: modalBounceIn 0.45s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }

      @keyframes playfulBounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-15px) rotate(-5deg); }
        50% { transform: translateY(0) rotate(0deg); }
        75% { transform: translateY(-10px) rotate(5deg); }
      }
      .animate-playful-bounce {
        animation: playfulBounce 3s ease-in-out infinite;
      }
    </style>
<script type="importmap">

    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
